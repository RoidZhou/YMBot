# MoveIt uses this configuration for controller management

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - body_controller
    - neck_controller
    - left_arm_controller
    - right_arm_controller
    # - body_neck_controller
    # - body_neck_arms_controller

  body_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - Body_Joint1
      - Body_Joint2
      - Body_Joint3
      - Body_Joint4
  neck_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - Neck_Joint1
      - Neck_Joint2
  left_arm_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - Left_Arm_Joint1
      - Left_Arm_Joint2
      - Left_Arm_Joint3
      - Left_Arm_Joint4
      - Left_Arm_Joint5
      - Left_Arm_Joint6
      - Left_Arm_Joint7
  right_arm_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - Right_Arm_Joint1
      - Right_Arm_Joint2
      - Right_Arm_Joint3
      - Right_Arm_Joint4
      - Right_Arm_Joint5
      - Right_Arm_Joint6
      - Right_Arm_Joint7
  body_neck_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - Body_Joint1
      - Body_Joint2
      - Body_Joint3
      - Body_Joint4
      - Neck_Joint1
      - Neck_Joint2
  body_neck_arms_controller:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - Body_Joint1
      - Body_Joint2
      - Body_Joint3
      - Body_Joint4
      - Left_Arm_Joint1
      - Left_Arm_Joint2
      - Left_Arm_Joint3
      - Left_Arm_Joint4
      - Left_Arm_Joint5
      - Left_Arm_Joint6
      - Left_Arm_Joint7
      - Neck_Joint1
      - Neck_Joint2
      - Right_Arm_Joint1
      - Right_Arm_Joint2
      - Right_Arm_Joint3
      - Right_Arm_Joint4
      - Right_Arm_Joint5
      - Right_Arm_Joint6
      - Right_Arm_Joint7