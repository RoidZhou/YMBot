# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 50  # Hz  到100cpu搞不过来

    body_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    # neck_controller:
    #   type: joint_trajectory_controller/JointTrajectoryController

    neck_controller:
      # type: position_controllers/JointGroupPositionController
      type: joint_trajectory_controller/JointTrajectoryController


    left_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    right_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    # body_neck_controller:
    #   type: joint_trajectory_controller/JointTrajectoryController

    # body_neck_arms_controller:
    #   type: joint_trajectory_controller/JointTrajectoryController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

body_controller:
  ros__parameters:
    joints:
      - Body_Joint1
      - Body_Joint2
      - Body_Joint3
      - Body_Joint4
    command_interfaces:
      - position
    state_interfaces:
      - position
    allow_nonzero_velocity_at_trajectory_end: true
neck_controller:
  ros__parameters:
    joints:
      - Neck_Joint1
      - Neck_Joint2
    command_interfaces:
      - position
    state_interfaces:
      - position
    allow_nonzero_velocity_at_trajectory_end: true
left_arm_controller:
  ros__parameters:
    joints:
      - Left_Arm_Joint1
      - Left_Arm_Joint2
      - Left_Arm_Joint3
      - Left_Arm_Joint4
      - Left_Arm_Joint5
      - Left_Arm_Joint6
      - Left_Arm_Joint7
    command_interfaces:
      - position
    state_interfaces:
      - position
    allow_nonzero_velocity_at_trajectory_end: true
right_arm_controller:
  ros__parameters:
    joints:
      - Right_Arm_Joint1
      - Right_Arm_Joint2
      - Right_Arm_Joint3
      - Right_Arm_Joint4
      - Right_Arm_Joint5
      - Right_Arm_Joint6
      - Right_Arm_Joint7
    command_interfaces:
      - position
    state_interfaces:
      - position
    allow_nonzero_velocity_at_trajectory_end: true
body_neck_controller:
  ros__parameters:
    joints:
      - Body_Joint1
      - Body_Joint2
      - Body_Joint3
      - Body_Joint4
      - Neck_Joint1
      - Neck_Joint2
    command_interfaces:
      - position
    state_interfaces:
      - position
    allow_nonzero_velocity_at_trajectory_end: true

# 底盘轮关节不在 ymbot_d 硬件接口中，但 URDF/MoveIt 需要其在 /joint_states 中出现
joint_state_broadcaster:
  ros__parameters:
    extra_joints:
      - Driven_Wheel_Joint1
      - Driven_Wheel_Joint2
      - Driven_Wheel_Joint3
      - Driven_Wheel_Joint4
      - Driven_Wheel_Joint5
      - Driven_Wheel_Joint6
      - Driven_Wheel_Joint7
      - Driven_Wheel_Joint8
      - Driving_Wheel_Joint1
      - Driving_Wheel_Joint2
      - front_wheel_joint
      - rear_wheel_joint

body_neck_arms_controller:
  ros__parameters:
    joints:
      - Body_Joint1
      - Body_Joint2
      - Body_Joint3
      - Body_Joint4
      - Left_Arm_Joint1
      - Left_Arm_Joint2
      - Left_Arm_Joint3
      - Left_Arm_Joint4
      - Left_Arm_Joint5
      - Left_Arm_Joint6
      - Left_Arm_Joint7
      - Neck_Joint1
      - Neck_Joint2
      - Right_Arm_Joint1
      - Right_Arm_Joint2
      - Right_Arm_Joint3
      - Right_Arm_Joint4
      - Right_Arm_Joint5
      - Right_Arm_Joint6
      - Right_Arm_Joint7
    command_interfaces:
      - position
    state_interfaces:
      - position
    allow_nonzero_velocity_at_trajectory_end: true