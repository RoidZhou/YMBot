body:
 kinematics_solver: pick_ik/PickIkPlugin
 kinematics_solver_search_resolution: 0.0050000000000000001
 kinematics_solver_timeout: 0.0050000000000000001
 mode: global

left_arm:
 kinematics_solver: pick_ik/PickIkPlugin
# kinematics_solver_search_resolution: 0.0050000000000000001
 kinematics_solver_timeout: 0.0050000000000000001
 mode: global
# gd_step_size: 0.0005     # 增大步长加速收敛（原0.0001）
#  # 精度阈值
#  position_threshold: 0.005      # 放宽位置误差至5mm（原1mm）
#  orientation_threshold: 0.01    # 放宽旋转误差至0.57度（原0.057度）
#  # 近似解容差
# approximate_solution_position_threshold: 0.8  # 允许更大位移的近似解（原0.05）

neck:
  kinematics_solver: pick_ik/PickIkPlugin
  kinematics_solver_search_resolution: 0.0050000000000000001
  kinematics_solver_timeout: 0.0050000000000000001
  mode: global
right_arm:
  kinematics_solver: pick_ik/PickIkPlugin
  kinematics_solver_search_resolution: 0.0050000000000000001
  kinematics_solver_timeout: 0.0050000000000000001
  mode: global

